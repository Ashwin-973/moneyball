<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#eefcfd",
              "on-primary-container": "#899798",
              "tertiary-container": "#2b2e25",
              "primary-fixed-dim": "#bbc9ca",
              "inverse-surface": "#263334",
              "on-tertiary-container": "#93958a",
              "on-surface": "#111e1f",
              "outline": "#737878",
              "error-container": "#ffdad6",
              "surface-container-highest": "#d7e5e6",
              "secondary-fixed-dim": "#9dd765",
              "secondary-fixed": "#b8f47d",
              "primary-fixed": "#d7e5e6",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#e8f6f7",
              "on-tertiary-fixed-variant": "#45483e",
              "surface-bright": "#eefcfd",
              "secondary": "#3a6a00",
              "on-secondary-fixed-variant": "#2a5000",
              "tertiary-fixed-dim": "#c6c8bb",
              "on-surface-variant": "#424848",
              "inverse-primary": "#bbc9ca",
              "on-primary-fixed": "#111e1f",
              "surface-variant": "#d7e5e6",
              "tertiary": "#161911",
              "on-tertiary-fixed": "#1a1d14",
              "on-secondary-fixed": "#0e2000",
              "on-background": "#111e1f",
              "secondary-container": "#b8f47d",
              "on-error-container": "#93000a",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "on-primary": "#ffffff",
              "surface-tint": "#536162",
              "surface-container": "#e2f1f2",
              "background": "#eefcfd",
              "tertiary-fixed": "#e2e4d6",
              "primary-container": "#222f30",
              "surface-container-high": "#dcebec",
              "on-primary-fixed-variant": "#3c494a",
              "inverse-on-surface": "#e5f4f4",
              "on-secondary": "#ffffff",
              "primary": "#0d1a1b",
              "outline-variant": "#c2c7c7",
              "on-secondary-container": "#3f7102",
              "surface-dim": "#ceddde",
              "brand-orange": "#FF5722"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-brand-orange/30">
<main class="min-h-screen flex items-center justify-center p-4 md:p-8">
<div class="max-w-5xl w-full grid md:grid-cols-2 bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_20px_40px_rgba(17,30,31,0.06)]">
<!-- Left Side: Brand Illustration (Desktop Only) -->
<div class="hidden md:block relative bg-primary overflow-hidden">
<div class="absolute inset-0 opacity-40">
<img class="w-full h-full object-cover" data-alt="Modern minimalist grocery store shelf with premium packaging and vibrant orange price tags in a bright airy studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgtieNRjsJF-DzBA13gGVAxMac3V2FgNRCuNjVPs0K78nCkSmvQIvQmzxLALkhUyD78PZsutt9pWz1-I6Gkof-MoAizqwVg5-Si9OXmgz9RuVVXT6g-N8PcGB5Gj2nfhVov-gTnL3zyShSI9qW5iPov4hoaVaxqsjnaFJ-AV5syhmt5xXQERAZ1dRUn-ldkGgOForpJ8iKvBIM5TEdhmX45IYpxYYZIIF8tHl_fn3boHetbB2q5FRtI9JNuFxssamC8x5zVtTHlCs"/>
</div>
<div class="relative h-full flex flex-col justify-end p-12 text-white">
<div class="bg-brand-orange w-12 h-1 mb-6"></div>
<h2 class="font-headline text-4xl font-extrabold tracking-tight mb-4 leading-tight">Precision in every deal.</h2>
<p class="font-body text-primary-fixed-dim max-w-sm leading-relaxed">
                        Moneyball uses advanced analytics to find the highest value locally. Science-driven savings for the modern consumer.
                    </p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="flex flex-col justify-center p-8 md:p-16 bg-white">
<!-- Brand Header -->
<div class="mb-10">
<h1 class="font-headline text-3xl font-black tracking-tighter text-primary mb-1">Moneyball</h1>
<p class="font-label text-brand-orange text-xs uppercase tracking-[0.2em] font-bold">Save More. Waste Less.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-4">
<div class="group">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase mb-1.5 ml-1" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-lg font-body text-sm focus:ring-2 focus:ring-brand-orange transition-all placeholder:text-on-primary-container/50" id="email" placeholder="name@company.com" type="email"/>
</div>
<div class="group">
<div class="flex justify-between items-center mb-1.5 ml-1">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label text-[10px] font-bold text-brand-orange uppercase hover:text-brand-orange/80 transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-lg font-body text-sm focus:ring-2 focus:ring-brand-orange transition-all placeholder:text-on-primary-container/50" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-brand-orange hover:bg-[#E64A19] text-white font-headline font-bold py-4 rounded-full shadow-lg shadow-brand-orange/20 transition-all active:scale-[0.98] flex justify-center items-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-highest"></div>
</div>
<div class="relative flex justify-center">
<span class="px-4 bg-white font-label text-[10px] text-outline uppercase font-bold tracking-widest">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 px-4 py-3.5 bg-white border border-outline-variant hover:bg-surface-container-lowest hover:border-outline transition-all rounded-lg font-body font-medium text-sm text-on-surface">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Sign in with Google</span>
</button>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-bold text-brand-orange hover:underline underline-offset-4 ml-1" href="#">Register</a>
</p>
</div>
</div>
</div>
</main>
<!-- Contextual Details: Only shown for precision layout -->
<div class="fixed bottom-6 right-6 flex flex-col items-end gap-2 pointer-events-none opacity-50">
<div class="font-label text-[10px] text-outline uppercase tracking-widest">System Status</div>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<div class="font-label text-[10px] text-on-surface font-bold">NODE_01_ACTIVE</div>
</div>
</div>
</body></html>
